name: Python Test

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: false
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.14"
      run-ty:
        description: "Run ty type checker"
        required: false
        type: boolean
        default: true
      check-paths:
        description: "Paths to check with ruff and ty (space-separated)"
        required: false
        type: string
        default: "."
      test-paths:
        description: "Paths to pass to pytest"
        required: false
        type: string
        default: "tests/"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Configure git for private repos
        # Two-tier credential strategy:
        #   1. If the caller supplied a GH_PAT (legacy), use it — this
        #      keeps repos that haven't migrated to the new access model
        #      working without a YAML change.
        #   2. Otherwise fall back to the workflow's auto-minted
        #      ``github.token``. Combined with ``access_level=organization``
        #      on the private dependency repos (set via gh api
        #      ``actions/permissions/access``), this lets any org repo
        #      clone any other org repo with no PAT involved.
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check ${{ inputs.check-paths }}

      - name: Type check
        if: ${{ inputs.run-ty }}
        run: uv run ty check ${{ inputs.check-paths }}

      - name: Run tests
        run: uv run pytest ${{ inputs.test-paths }} -v
